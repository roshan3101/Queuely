services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-queuely}
      POSTGRES_USER: ${POSTGRES_USER:-queuely}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-queuely}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-queuely} -d ${POSTGRES_DB:-queuely}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["uvicorn", "queuely.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../backend/src:/app/src
      - ../backend/migrations:/app/migrations
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../backend
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "queuely.tasks.celery_app:celery_app", "worker", "--loglevel=info", "-Q", "jobs.default,jobs.pdf,jobs.report,jobs.email,jobs.dlq"]
    volumes:
      - ../backend/src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "celery -A queuely.tasks.celery_app:celery_app inspect ping --timeout=5 | grep -q pong"]
      interval: 20s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: ../frontend
      target: dev
    env_file:
      - ../.env.example
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
